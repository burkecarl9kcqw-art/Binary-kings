body{
background:#050505;

justify-content:center;

/* floating particles */
.bg span{
position:absolute;
width:4px;
height:4px;
background:#00ff99;
border-radius:50%;
animation:move 12s linear infinite;
}

@keyframes move{
0%{
transform:translateY(100vh) scale(0);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-100vh) scale(2);
opacity:0;
}
}

/* card design */
.card{
width:90%;
max-width:420px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.1);
border-radius:25px;
padding:30px;
text-align:center;
box-shadow:0 0 35px #00ff99;
}

/* logo image */
.logo img{
width:120px;
height:120px;
object-fit:contain;
animation:float 2s infinite;
}

/* floating animation */
@keyframes float{
50%{transform:translateY(-10px);}
}

h1{
color:#00ff99;
margin:15px 0;
}

p{
font-size:18px;
line-height:32px;
color:#ddd;
}

.btn{

color:#fff;
text-decoration:none;
font-size:22px;
font-weight:bold;

box-shadow:0 0 25px #229ED9;
transition:.3s;
}

.btn:hover{
transform:scale(1.08);
box-shadow:0 0 45px #229ED9;
}

.footer{

color:#aaa;
}
